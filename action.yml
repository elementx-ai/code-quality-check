name: Project Checks
description: Check out a repository, set up Node and Python tooling when needed, then run standard project checks.
inputs:
  checkout:
    description: Check out the calling repository before scanning for projects.
    required: false
    default: "true"
  fetch-depth:
    description: Checkout depth. Use 0 when changed-only mode needs full history.
    required: false
    default: "0"
  auto-setup:
    description: Automatically set up Node and Python toolchains based on detected project types.
    required: false
    default: "true"
  auto-install:
    description: Automatically install Node dependencies before running checks when a lockfile strategy can be resolved.
    required: false
    default: "true"
  node-version:
    description: Node version to install when Node projects are detected.
    required: false
    default: "24"
  node-install-command:
    description: Command to run when automatically installing Node dependencies.
    required: false
    default: npm ci
  python-version:
    description: Python version to install when Python projects are detected.
    required: false
    default: "3.12"
  uv-version:
    description: Optional uv version to install when Python projects are detected.
    required: false
    default: ""
  working-directory:
    description: Directory to scan for projects.
    required: false
    default: .
  project-depth:
    description: Maximum directory depth to search for project manifests. Use 0 for root only, 1 for root plus direct child folders, or -1 for unlimited depth.
    required: false
    default: "-1"
  include-root:
    description: Include the working directory itself when it contains a supported manifest.
    required: false
    default: "true"
  changed-only:
    description: Only run checks for discovered projects that contain changed files.
    required: false
    default: "false"
  base-ref:
    description: Base git ref or SHA to diff against when changed-only is true.
    required: false
  head-ref:
    description: Head git ref or SHA to diff against when changed-only is true.
    required: false
    default: HEAD
  python-format-command:
    description: Command to run for Python formatting checks when Ruff is detected.
    required: false
    default: uv run ruff format --check .
  python-lint-command:
    description: Command to run for Python lint checks when Ruff is detected.
    required: false
    default: uv run ruff check .
  terraform-version:
    description: Terraform version to install when Terraform projects are detected.
    required: false
    default: latest
  tflint-version:
    description: TFLint version to install when Terraform projects are detected.
    required: false
    default: latest
  terraform-format-command:
    description: Command to run for Terraform formatting checks.
    required: false
    default: terraform fmt -check -recursive
  terraform-lint-command:
    description: Command to run for Terraform lint checks.
    required: false
    default: tflint --recursive
outputs:
  repo_mode:
    description: empty, single-project, or monorepo.
    value: ${{ steps.run.outputs.repo_mode }}
  project_count:
    description: Number of discovered project roots.
    value: ${{ steps.run.outputs.project_count }}
  selected_project_count:
    description: Number of project roots selected for execution after filtering.
    value: ${{ steps.run.outputs.selected_project_count }}
  project_paths:
    description: JSON array of discovered project paths relative to the working directory.
    value: ${{ steps.run.outputs.project_paths }}
  selected_project_paths:
    description: JSON array of selected project paths relative to the working directory.
    value: ${{ steps.run.outputs.selected_project_paths }}
  detected_ecosystems:
    description: JSON array of ecosystems detected across discovered project roots.
    value: ${{ steps.run.outputs.detected_ecosystems }}
  passed_project_paths:
    description: JSON array of project roots whose checks completed successfully.
    value: ${{ steps.run.outputs.passed_project_paths }}
  failed_project_paths:
    description: JSON array of project roots whose checks failed.
    value: ${{ steps.run.outputs.failed_project_paths }}
  execution_results:
    description: JSON array of per-project execution results with path, ecosystems, status, and optional error.
    value: ${{ steps.run.outputs.execution_results }}
runs:
  using: composite
  steps:
    - name: Checkout
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Detect ecosystems
      id: detect
      shell: bash
      run: "$GITHUB_ACTION_PATH/scripts/detect-ecosystems.sh"
      env:
        PROJECT_CHECKS_WORKING_DIRECTORY: ${{ inputs.working-directory }}

    - name: Setup Node
      if: ${{ inputs.auto-setup == 'true' && steps.detect.outputs.has_node == 'true' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Python
      if: ${{ inputs.auto-setup == 'true' && steps.detect.outputs.has_python == 'true' }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Setup uv
      if: ${{ inputs.auto-setup == 'true' && steps.detect.outputs.has_python == 'true' && inputs.uv-version == '' }}
      uses: astral-sh/setup-uv@v7

    - name: Setup uv version
      if: ${{ inputs.auto-setup == 'true' && steps.detect.outputs.has_python == 'true' && inputs.uv-version != '' }}
      uses: astral-sh/setup-uv@v7
      with:
        version: ${{ inputs.uv-version }}

    - name: Setup Terraform
      if: ${{ inputs.auto-setup == 'true' && steps.detect.outputs.has_terraform == 'true' }}
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - name: Setup TFLint
      if: ${{ inputs.auto-setup == 'true' && steps.detect.outputs.has_terraform == 'true' }}
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: ${{ inputs.tflint-version }}

    - name: Run project checks
      id: run
      shell: bash
      run: node "$GITHUB_ACTION_PATH/dist/index.mjs"
      env:
        PROJECT_CHECKS_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        PROJECT_CHECKS_AUTO_INSTALL: ${{ inputs.auto-install }}
        PROJECT_CHECKS_PROJECT_DEPTH: ${{ inputs.project-depth }}
        PROJECT_CHECKS_INCLUDE_ROOT: ${{ inputs.include-root }}
        PROJECT_CHECKS_CHANGED_ONLY: ${{ inputs.changed-only }}
        PROJECT_CHECKS_BASE_REF: ${{ inputs.base-ref }}
        PROJECT_CHECKS_HEAD_REF: ${{ inputs.head-ref }}
        PROJECT_CHECKS_NODE_INSTALL_COMMAND: ${{ inputs.node-install-command }}
        PROJECT_CHECKS_PYTHON_FORMAT_COMMAND: ${{ inputs.python-format-command }}
        PROJECT_CHECKS_PYTHON_LINT_COMMAND: ${{ inputs.python-lint-command }}
        PROJECT_CHECKS_TERRAFORM_FORMAT_COMMAND: ${{ inputs.terraform-format-command }}
        PROJECT_CHECKS_TERRAFORM_LINT_COMMAND: ${{ inputs.terraform-lint-command }}
