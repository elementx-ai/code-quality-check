name: Build and Test
on: pull_request

permissions:
  contents: read
  pull-requests: read

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.release-please-filter.outputs.skip }}
    steps:
      - id: release-please-filter
        uses: actions/github-script@v8
        with:
          script: |
            core.setOutput("skip", "false");

            try {
              const pr = context.payload.pull_request;
              const author = pr?.user?.login ?? "";
              const headRef = pr?.head?.ref ?? "";
              const body = pr?.body ?? "";

              const isReleasePleasePr =
                (author === "app/github-actions" || pr?.user?.type === "Bot") &&
                (
                  headRef.startsWith("release-please--") ||
                  body.includes("This PR was generated with [Release Please]")
                );

              if (!isReleasePleasePr) {
                return;
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });

              const changedFiles = files.map((file) => file.filename);
              const hasChangelog = changedFiles.some((filename) =>
                /(?:^|\/)changelog\.md$/i.test(filename),
              );
              const hasManifest = changedFiles.includes(".release-please-manifest.json");
              const onlyReleasePleaseMetadata =
                hasChangelog &&
                hasManifest &&
                changedFiles.length > 0 &&
                changedFiles.every(
                  (filename) =>
                    filename === ".release-please-manifest.json" ||
                    /(?:^|\/)changelog\.md$/i.test(filename) ||
                    /(?:^|\/)package\.json$/i.test(filename) ||
                    /(?:^|\/)package-lock\.json$/i.test(filename),
                );

              core.info(
                `release-please PR changed files: ${changedFiles.join(", ") || "(none)"}`,
              );
              core.setOutput("skip", onlyReleasePleaseMetadata ? "true" : "false");
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.warning(
                `Unable to evaluate Release Please PR skip logic; defaulting to running build-and-test. ${message}`,
              );
              core.setOutput("skip", "false");
            }

  build-and-test:
    needs: should-run
    runs-on: ubuntu-latest
    steps:
      - name: Skip metadata-only Release Please PR
        if: ${{ needs.should-run.outputs.skip == 'true' }}
        run: echo "Skipping build-and-test for metadata-only Release Please PR."

      - uses: actions/checkout@v4
        if: ${{ needs.should-run.outputs.skip != 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ needs.should-run.outputs.skip != 'true' }}
        with:
          node-version: "20"
      - if: ${{ needs.should-run.outputs.skip != 'true' }}
        run: npm ci
      - if: ${{ needs.should-run.outputs.skip != 'true' }}
        run: npm run build
      - if: ${{ needs.should-run.outputs.skip != 'true' }}
        run: git diff --exit-code -- dist/index.mjs
      - if: ${{ needs.should-run.outputs.skip != 'true' }}
        run: npm run test
